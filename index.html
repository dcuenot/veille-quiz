<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quiz Veille — teste tes connaissances</title>
<meta name="description" content="Quiz quotidien sur la veille tech : agents IA, outillage dev, design, sécurité. Auto-généré.">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel-2:#1d212b; --line:#272c38;
    --ink:#e8ecf4; --muted:#9aa3b2; --accent:#7dd3fc; --accent-2:#a3e635;
    --ok:#34d399; --ko:#f87171; --shadow:0 1px 0 rgba(255,255,255,.03),0 8px 30px rgba(0,0,0,.35);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  html{background:var(--bg)}
  body{
    background:radial-gradient(1200px 600px at 50% -10%,#1a1f2b 0%,var(--bg) 60%) fixed;
    color:var(--ink); font:16px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    padding-bottom:calc(84px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:760px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 20px 24px}
  header{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  h1{font-size:1.5rem;margin:0;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.9rem}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:18px 0 8px}
  select,button{font:inherit;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;cursor:pointer;transition:transform .08s,border-color .15s,filter .15s}
  select:hover,button:hover{border-color:#3a4255}
  button:active{transform:translateY(1px) scale(.99)}
  .spacer{flex:1}
  .bar #cat{min-width:0;flex:0 1 auto;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{padding:9px 12px;line-height:1;flex:0 0 auto}
  .pill{font-size:.8rem;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-top:14px}
  .qmeta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .cat{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);
    border:1px solid #2b3a44;background:#10222b;border-radius:999px;padding:4px 10px}
  .q{font-size:1.18rem;font-weight:600;margin:2px 0 18px;letter-spacing:-.01em}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    transition:transform .08s,border-color .15s,background .15s}
  .choice:not(:disabled):hover{border-color:#3a4255;transform:translateY(-1px)}
  .choice:not(:disabled):active{transform:scale(.985)}
  .choice .key{flex:0 0 22px;height:22px;border-radius:6px;background:var(--panel-2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:.78rem;color:var(--muted);margin-top:1px}
  .choice.correct{border-color:var(--ok);background:#0e2018;animation:pulse .55s ease-out}
  .choice.correct .key{background:var(--ok);color:#062417;border-color:var(--ok)}
  .choice.wrong{border-color:var(--ko);background:#23121280;animation:shake .3s ease}
  .choice.wrong .key{background:var(--ko);color:#2a0b0b;border-color:var(--ko)}
  .choice:disabled{cursor:default;opacity:1}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.45)}100%{box-shadow:0 0 0 16px rgba(52,211,153,0)}}
  @keyframes shake{25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
  .explain{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);display:none}
  .explain.show{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .explain p{margin:0 0 12px;color:#d6dbe6}
  .explain .ctx{margin:0 0 14px;color:var(--muted);font-size:.92rem;line-height:1.55;border-left:2px solid var(--accent);padding-left:12px}
  .explain .ctx::before{content:"Contexte — ";color:var(--accent);font-weight:600}
  .more a{color:var(--accent-2);text-decoration:none;border-bottom:1px solid #3c4a1f;padding-bottom:1px}
  .more a:hover{border-color:var(--accent-2)}
  .empty{color:var(--muted);text-align:center;padding:40px 0}
  .results .q{text-align:center}
  .bigscore{font-size:2.4rem;font-weight:700;text-align:center;margin:6px 0 20px;letter-spacing:-.02em}
  .bigscore .pct{display:block;font-size:1rem;font-weight:500;color:var(--muted);margin-top:4px}
  .choice.restart{justify-content:center;text-align:center;font-weight:600}
  /* Gamification */
  .htop{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .streakchip{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;font-size:.85rem;font-weight:600}
  .streakchip.dim{opacity:.5;filter:grayscale(.6)}
  .streakchip .flame{font-size:1rem;line-height:1}
  .streakchip .unit{color:var(--muted);font-weight:500;margin-left:-3px}
  .goaldots{display:flex;align-items:center;gap:4px;margin-left:4px;padding-left:8px;border-left:1px solid var(--line)}
  .goaldots .dot{width:7px;height:7px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line)}
  .goaldots .dot.on{background:var(--accent-2);border-color:var(--accent-2)}
  .goaldots .gx{color:var(--muted);font-weight:500;font-size:.78rem;margin-left:3px}
  .gam-panel .gline{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;font-size:.95rem;font-weight:600}
  .gam-panel .gline .rec{color:var(--muted);font-weight:500}
  .gam-panel .goalstate{text-align:center;margin:10px 0 4px;font-size:.9rem}
  .gam-panel .goalstate.met{color:var(--ok)}
  .gam-panel .goalstate.pending{color:var(--muted)}
  .gam-panel .stats{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;color:var(--muted);font-size:.82rem;margin:10px 0 16px}
  .gam-panel .stats b{color:var(--ink);font-weight:600}
  .badgegrid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .badge{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;
    padding:5px 11px;font-size:.8rem;color:var(--muted);background:var(--panel)}
  .badge.on{color:var(--ink);border-color:#3a4255;background:var(--panel-2)}
  .badge.fresh{border-color:var(--accent-2);color:var(--accent-2);animation:pulse .6s ease-out}
  .toast{position:fixed;left:50%;top:calc(16px + env(safe-area-inset-top));transform:translate(-50%,-16px);
    z-index:40;background:var(--panel-2);border:1px solid #3a4255;border-radius:12px;padding:11px 16px;
    font-size:.9rem;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:opacity .25s,transform .25s;
    pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  footer{color:var(--muted);font-size:.8rem;text-align:center;margin-top:22px}
  footer a{color:var(--muted)}
  .progress{height:4px;background:var(--panel);border-radius:999px;overflow:hidden;margin-top:10px}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:0;transition:width .25s}
  /* Barre d'action collante (toujours sous le pouce) */
  .actionbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:rgba(15,17,21,.82);-webkit-backdrop-filter:blur(12px) saturate(140%);backdrop-filter:blur(12px) saturate(140%);
    border-top:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .actionbar .inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .actionbar .verdict{font-size:.92rem;font-weight:600}
  .actionbar .verdict.ok{color:var(--ok)} .actionbar .verdict.ko{color:var(--ko)}
  .actionbar .score{color:var(--muted);font-size:.85rem}
  .actionbar .primary{margin-left:auto;background:var(--accent);color:#04222e;border-color:transparent;font-weight:600;padding:13px 18px}
  .actionbar .primary:hover{filter:brightness(1.06)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="htop">
      <h1>Quiz Veille</h1>
      <div class="streakchip" id="streakchip" hidden>
        <span class="flame">🔥</span><span id="streaknum">0</span><span class="unit">j</span>
        <span class="goaldots" id="goaldots"></span>
      </div>
    </div>
    <div class="sub"><span id="updated"></span></div>
  </header>

  <div class="bar">
    <select id="cat" aria-label="Catégorie"><option value="">Toutes les catégories</option></select>
    <span class="spacer"></span>
    <span class="pill" id="counter">—</span>
    <button id="shuffle" class="iconbtn" title="Nouveau tirage" aria-label="Nouveau tirage">↻</button>
  </div>
  <div class="progress"><i id="bar"></i></div>

  <div id="stage"></div>

  <footer>Auto-généré depuis ma base de veille · <a id="repo" href="#">code</a></footer>
</div>

<div class="actionbar">
  <div class="inner">
    <span class="verdict" id="verdict"></span>
    <span class="score" id="score"></span>
    <button class="primary" id="next">Question suivante →</button>
  </div>
</div>

<div class="toast" id="toast" hidden></div>

<script src="./gam.js"></script>
<script>
const state={all:[],deck:[],i:0,score:0,answered:0,cat:""};
const $=s=>document.querySelector(s);

// Liens "Aller lire le chapitre" (VO) pour les questions issues d'un livre (source_slug "livre-*").
// SRE Book de Google = gratuit en ligne ; les autres -> recherche O'Reilly par titre (VO).
const BOOK_LINKS={
  "livre-site-reliability-engineering-google":{url:"https://sre.google/sre-book/table-of-contents/",label:"SRE Book — gratuit en ligne"},
  "livre-accelerate-forsgren-humble-kim":{url:"https://www.oreilly.com/search/?q=Accelerate%20Forsgren%20Humble%20Kim",label:"Accelerate (O'Reilly)"},
  "livre-the-phoenix-project-kim-behr-spafford":{url:"https://www.oreilly.com/search/?q=The%20Phoenix%20Project%20Gene%20Kim",label:"The Phoenix Project (O'Reilly)"},
  "livre-seeking-sre-blank-edelman":{url:"https://www.oreilly.com/search/?q=Seeking%20SRE",label:"Seeking SRE (O'Reilly)"},
  "livre-continuous-integration-cd-van-merode":{url:"https://www.oreilly.com/search/?q=Continuous%20Integration%20Continuous%20Delivery%20van%20Merode",label:"CI/CD — Van Merode (O'Reilly)"},
  "livre-ai-agents-definitive-guide":{url:"https://www.oreilly.com/search/?q=AI%20Agents%20The%20Definitive%20Guide",label:"AI Agents: The Definitive Guide (O'Reilly)"},
  "livre-building-ai-agents-llms-rag-kg":{url:"https://www.oreilly.com/search/?q=Building%20AI%20Agents%20with%20LLMs%20RAG%20Knowledge%20Graphs",label:"Building AI Agents (O'Reilly)"},
  "livre-agentic-coding-claude-code":{url:"https://www.oreilly.com/search/?q=Agentic%20Coding%20with%20Claude%20Code",label:"Agentic Coding with Claude Code (O'Reilly)"},
  "livre-hands-on-rag-for-production":{url:"https://www.oreilly.com/search/?q=Hands-On%20RAG%20for%20Production",label:"Hands-On RAG for Production (O'Reilly)"},
  "livre-user-experience-design-kantamneni":{url:"https://www.oreilly.com/search/?q=User%20Experience%20Design%20Kantamneni",label:"UX Design — Kantamneni (O'Reilly)"}
};
const buzz=p=>{try{navigator.vibrate&&navigator.vibrate(p)}catch(e){}};

// --- Gamification (streak quotidien, persiste en localStorage ; degrade proprement si gam.js absent) ---
const GAM_ON=typeof Gam!=="undefined";
const GAM_KEY="veille-quiz:gam";
const today=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
function gamLoad(){try{return Gam.normalize(JSON.parse(localStorage.getItem(GAM_KEY)));}catch(e){return Gam.emptyState();}}
function gamSave(s){try{localStorage.setItem(GAM_KEY,JSON.stringify(s));}catch(e){}}
let gam=GAM_ON?Gam.refreshDay(gamLoad(),today()):null;
if(GAM_ON)gamSave(gam);
let freshBadges=[];   // badges debloques pendant cette session (mis en avant sur l'ecran de score)

function renderStreak(){
  if(!GAM_ON)return;
  const snap=Gam.snapshot(gam,today());
  const chip=$("#streakchip");chip.hidden=false;chip.classList.toggle("dim",snap.streak===0);
  $("#streaknum").textContent=snap.streak;
  let dots="";for(let i=0;i<snap.goal;i++)dots+=`<i class="dot${i<snap.todayCount?" on":""}"></i>`;
  $("#goaldots").innerHTML=dots+`<span class="gx">${Math.min(snap.todayCount,snap.goal)}/${snap.goal}</span>`;
}

let toastQ=[],toastBusy=false;
function toast(msg){toastQ.push(msg);if(!toastBusy)toastNext();}
function toastNext(){
  if(!toastQ.length){toastBusy=false;return;}
  toastBusy=true;const el=$("#toast");el.textContent=toastQ.shift();el.hidden=false;
  requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{el.classList.remove("show");setTimeout(()=>{el.hidden=true;toastNext();},260);},1900);
}

function recordAnswer(good){
  if(!GAM_ON)return;
  const r=Gam.applyAnswer(gam,good,today());
  gam=r.state;gamSave(gam);
  if(r.goalJustMet)toast(`Objectif du jour atteint — 🔥 ${gam.streak} j`);
  r.newBadges.forEach(id=>{const b=Gam.BADGES.find(x=>x.id===id);freshBadges.push(id);toast(`Badge débloqué : ★ ${b?b.label:id}`);});
  renderStreak();
}

function catList(qs){return [...new Set(qs.map(q=>q.category))].sort();}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildDeck(){
  let qs=state.all.filter(q=>!state.cat||q.category===state.cat);
  state.deck=shuffle(qs);state.i=0;state.score=0;state.answered=0;render();
}

function render(){
  const stage=$("#stage");
  $("#verdict").textContent="";$("#verdict").className="verdict";
  if(!state.deck.length){stage.innerHTML='<div class="empty">Aucune question pour cette catégorie.</div>';update();return;}
  const q=state.deck[state.i];
  const keys=["A","B","C","D","E"];
  const isBook=(q.source_slug||"").startsWith("livre-");
  const link=(q.more&&q.more.url)?q.more:(isBook?BOOK_LINKS[q.source_slug]:null);
  const moreHtml=link&&link.url
    ?`<div class="more">${isBook?"Aller lire le chapitre":"Pour aller plus loin"} → <a href="${link.url}" target="_blank" rel="noopener">${link.label||link.url}</a></div>`
    :"";
  stage.innerHTML=`
    <div class="card">
      <div class="qmeta"><span class="cat">${q.category}</span></div>
      <div class="q">${q.question}</div>
      <div class="choices">
        ${q.choices.map((c,idx)=>`<button class="choice" data-i="${idx}">
            <span class="key">${keys[idx]}</span><span>${c}</span></button>`).join("")}
      </div>
      <div class="explain" id="explain">
        <p id="exp"></p>
        <p id="ctx" class="ctx"></p>
        ${moreHtml}
      </div>
    </div>`;
  stage.querySelectorAll(".choice").forEach(b=>b.onclick=()=>answer(+b.dataset.i));
  const last=state.i>=state.deck.length-1;
  const nb=$("#next");nb.textContent=last?"Voir mon score →":"Question suivante →";nb.onclick=next;
  update();
}

function answer(idx){
  const q=state.deck[state.i];
  const btns=[...document.querySelectorAll(".choice")];
  if(!btns.length||btns[0].disabled)return;
  btns.forEach(b=>b.disabled=true);
  btns[q.answer].classList.add("correct");
  const good=idx===q.answer;
  if(!good)btns[idx].classList.add("wrong");
  buzz(good?18:[10,45,10]);
  state.answered++; if(good)state.score++;
  recordAnswer(good);
  $("#exp").textContent=q.explanation||"";
  const ctx=$("#ctx");ctx.textContent=q.context||"";ctx.style.display=q.context?"":"none";
  $("#explain").classList.add("show");
  const v=$("#verdict");v.textContent=good?"Correct ✓":"Raté ✗";v.className="verdict "+(good?"ok":"ko");
  update();
}

function next(){
  buzz(8);
  if(state.i>=state.deck.length-1){showResults();return;}
  state.i++;render();window.scrollTo({top:0,behavior:"smooth"});
}

function showResults(){
  buzz(12);
  const n=state.answered,s=state.score,pct=n?Math.round(100*s/n):0;
  const msg=pct>=80?"Excellent":pct>=50?"Bien joué":"À retravailler";
  let gamPanel="";
  if(GAM_ON){
    const snap=Gam.snapshot(gam,today());
    const badges=snap.badges.map(b=>`<span class="badge${b.unlocked?" on":""}${freshBadges.includes(b.id)?" fresh":""}">${b.unlocked?"★":"☆"} ${b.label}</span>`).join("");
    const goalHtml=snap.goalMet
      ?`<div class="goalstate met">Objectif du jour atteint ✓</div>`
      :`<div class="goalstate pending">Plus que ${snap.remaining} question${snap.remaining>1?"s":""} aujourd'hui pour valider le jour</div>`;
    gamPanel=`
    <div class="card gam-panel">
      <div class="gline"><span class="flame">🔥</span> Streak ${snap.streak} j <span class="rec">· record ${snap.bestStreak} j</span></div>
      ${goalHtml}
      <div class="stats"><span><b>${snap.totalAnswered}</b> réponse${snap.totalAnswered>1?"s":""}</span><span><b>${snap.accuracy}%</b> précision</span><span><b>${snap.daysPlayed}</b> jour${snap.daysPlayed>1?"s":""}</span></div>
      <div class="badgegrid">${badges}</div>
    </div>`;
  }
  $("#stage").innerHTML=`
    <div class="card results">
      <div class="qmeta"><span class="cat">Résultat</span></div>
      <div class="q">${msg}</div>
      <div class="bigscore">${s} / ${n}<span class="pct">${pct}% de bonnes réponses</span></div>
      <button class="choice restart" id="restart"><span class="key">↻</span><span>Recommencer</span></button>
    </div>${gamPanel}`;
  freshBadges=[];
  $("#restart").onclick=buildDeck;
  $("#bar").style.width="100%";
  $("#counter").textContent=`${state.deck.length} / ${state.deck.length}`;
  $("#score").textContent=n?`${s}/${n}`:"";
  const v=$("#verdict");v.textContent="Terminé ✓";v.className="verdict ok";
  const nb=$("#next");nb.textContent="Recommencer ↻";nb.onclick=buildDeck;
  window.scrollTo({top:0,behavior:"smooth"});
}

function update(){
  $("#counter").textContent=state.deck.length?`${state.i+1} / ${state.deck.length}`:"0";
  $("#bar").style.width=state.deck.length?`${(state.i/state.deck.length)*100}%`:"0";
  $("#score").textContent=state.answered?`${state.score}/${state.answered}`:"";
}

fetch("./quiz.json?_="+Date.now()).then(r=>r.json()).then(data=>{
  state.all=data.questions||[];
  if(data.generated)$("#updated").textContent="mis à jour le "+data.generated;
  if(data.repo_url)$("#repo").href=data.repo_url;
  const sel=$("#cat");
  catList(state.all).forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});
  sel.onchange=()=>{state.cat=sel.value;buildDeck();};
  $("#shuffle").onclick=buildDeck;
  $("#next").onclick=next;
  buildDeck();
  renderStreak();
}).catch(e=>{$("#stage").innerHTML='<div class="empty">Impossible de charger le quiz (quiz.json).</div>';});
</script>
</body>
</html>
