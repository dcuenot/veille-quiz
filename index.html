<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz Veille — teste tes connaissances</title>
<meta name="description" content="Quiz quotidien sur la veille tech : agents IA, outillage dev, design, sécurité. Auto-généré.">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel-2:#1d212b; --line:#272c38;
    --ink:#e8ecf4; --muted:#9aa3b2; --accent:#7dd3fc; --accent-2:#a3e635;
    --ok:#34d399; --ko:#f87171; --shadow:0 1px 0 rgba(255,255,255,.03),0 8px 30px rgba(0,0,0,.35);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 600px at 50% -10%,#1a1f2b 0%,var(--bg) 60%) fixed;
    color:var(--ink); font:16px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 64px}
  header{display:flex;flex-direction:column;gap:6px;margin-bottom:22px}
  h1{font-size:1.5rem;margin:0;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.9rem}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:18px 0 8px}
  select,button{font:inherit;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;cursor:pointer;transition:.15s}
  select:hover,button:hover{border-color:#3a4255}
  .spacer{flex:1}
  .pill{font-size:.8rem;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-top:14px}
  .qmeta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .cat{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);
    border:1px solid #2b3a44;background:#10222b;border-radius:999px;padding:4px 10px}
  .q{font-size:1.18rem;font-weight:600;margin:2px 0 18px;letter-spacing:-.01em}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .choice:not(:disabled):hover{border-color:#3a4255;transform:translateY(-1px)}
  .choice .key{flex:0 0 22px;height:22px;border-radius:6px;background:var(--panel-2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:.78rem;color:var(--muted);margin-top:1px}
  .choice.correct{border-color:var(--ok);background:#0e2018}
  .choice.correct .key{background:var(--ok);color:#062417;border-color:var(--ok)}
  .choice.wrong{border-color:var(--ko);background:#23121280}
  .choice.wrong .key{background:var(--ko);color:#2a0b0b;border-color:var(--ko)}
  .choice:disabled{cursor:default;opacity:1}
  .explain{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);display:none}
  .explain.show{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .explain p{margin:0 0 12px;color:#d6dbe6}
  .more a{color:var(--accent-2);text-decoration:none;border-bottom:1px solid #3c4a1f;padding-bottom:1px}
  .more a:hover{border-color:var(--accent-2)}
  .foot{display:flex;gap:10px;align-items:center;margin-top:18px}
  .primary{background:var(--accent);color:#04222e;border-color:transparent;font-weight:600}
  .primary:hover{filter:brightness(1.06)}
  .score{color:var(--muted);font-size:.9rem}
  .empty{color:var(--muted);text-align:center;padding:40px 0}
  footer{color:var(--muted);font-size:.8rem;text-align:center;margin-top:34px}
  footer a{color:var(--muted)}
  .progress{height:4px;background:var(--panel);border-radius:999px;overflow:hidden;margin-top:10px}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:0;transition:width .25s}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Quiz Veille</h1>
    <div class="sub">Teste tes connaissances sur la veille tech — agents IA, outillage dev, design, sécurité.
      <span id="updated"></span></div>
  </header>

  <div class="bar">
    <select id="cat" aria-label="Catégorie"><option value="">Toutes les catégories</option></select>
    <span class="spacer"></span>
    <span class="pill" id="counter">—</span>
    <button id="shuffle" title="Nouveau tirage">↻ Mélanger</button>
  </div>
  <div class="progress"><i id="bar"></i></div>

  <div id="stage"></div>

  <footer>
    Auto-généré depuis ma base de veille · <a id="repo" href="#">code</a> · <span id="score" class="score"></span>
  </footer>
</div>

<script>
const state={all:[],deck:[],i:0,score:0,answered:0,cat:""};
const $=s=>document.querySelector(s);

function catList(qs){return [...new Set(qs.map(q=>q.category))].sort();}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildDeck(){
  let qs=state.all.filter(q=>!state.cat||q.category===state.cat);
  state.deck=shuffle(qs);state.i=0;state.score=0;state.answered=0;render();
}

function render(){
  const stage=$("#stage");
  if(!state.deck.length){stage.innerHTML='<div class="empty">Aucune question pour cette catégorie.</div>';update();return;}
  const q=state.deck[state.i];
  const keys=["A","B","C","D","E"];
  stage.innerHTML=`
    <div class="card">
      <div class="qmeta"><span class="cat">${q.category}</span></div>
      <div class="q">${q.question}</div>
      <div class="choices">
        ${q.choices.map((c,idx)=>`<button class="choice" data-i="${idx}">
            <span class="key">${keys[idx]}</span><span>${c}</span></button>`).join("")}
      </div>
      <div class="explain" id="explain">
        <p id="exp"></p>
        ${q.more&&q.more.url?`<div class="more">Pour aller plus loin → <a href="${q.more.url}" target="_blank" rel="noopener">${q.more.label||q.more.url}</a></div>`:""}
      </div>
      <div class="foot">
        <button class="primary" id="next">Question suivante →</button>
        <span class="score" id="local"></span>
      </div>
    </div>`;
  stage.querySelectorAll(".choice").forEach(b=>b.onclick=()=>answer(+b.dataset.i));
  $("#next").onclick=next;
  update();
}

function answer(idx){
  const q=state.deck[state.i];
  const btns=[...document.querySelectorAll(".choice")];
  if(btns[0].disabled)return;
  btns.forEach(b=>b.disabled=true);
  btns[q.answer].classList.add("correct");
  if(idx!==q.answer)btns[idx].classList.add("wrong");
  state.answered++;
  if(idx===q.answer)state.score++;
  $("#exp").textContent=q.explanation||"";
  $("#explain").classList.add("show");
  $("#local").textContent=idx===q.answer?"Correct ✓":"Raté ✗";
  update();
}

function next(){state.i=(state.i+1)%state.deck.length;render();}

function update(){
  $("#counter").textContent=state.deck.length?`${state.i+1} / ${state.deck.length}`:"0";
  $("#bar").style.width=state.deck.length?`${(state.i/state.deck.length)*100}%`:"0";
  $("#score").textContent=state.answered?`Score : ${state.score}/${state.answered}`:"";
}

fetch("./quiz.json?_="+Date.now()).then(r=>r.json()).then(data=>{
  state.all=data.questions||[];
  if(data.generated)$("#updated").textContent="· mis à jour le "+data.generated;
  if(data.repo_url)$("#repo").href=data.repo_url;
  const sel=$("#cat");
  catList(state.all).forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});
  sel.onchange=()=>{state.cat=sel.value;buildDeck();};
  $("#shuffle").onclick=buildDeck;
  buildDeck();
}).catch(e=>{$("#stage").innerHTML='<div class="empty">Impossible de charger le quiz (quiz.json).</div>';});
</script>
</body>
</html>
